# ========================================
# HangRong - Configuration
# ========================================

economy:
  type: VAULT
  playerpoints-plugin-name: "PlayerPoints"

tax:
  enabled: true
  percentage: 5.0
  tax-account: "server"
  bypass-permission: "hangrong.admin.bypass-tax"

npc:
  hologram-enabled: true
  hologram-update-interval: 5
  hologram-line-height: 0.35
  hologram-display-limit: 5
  click-cooldown: 1.0
  skin: "default"

gui:
  rows: 4
  title: "&6&lSạp hàng của %seller%"
  fill-empty-slots: true
  filler-item: "GRAY_STAINED_GLASS_PANE"
  filler-name: "&7"
  buy-item-name: "&a%s% &7- &e$%price%"
  buy-item-lore:
    - "&7Gia: &e$%price%"
    - "&7Ton kho: &e%stock%"
    - ""
    - "&7Mua &f8 &7cai = &a$%bulk_price% &7(giam &c%discount%%%"
    - ""
    - "&eClick để mua!"
  out-of-stock-name: "&c%s% &7- &cHet hàng"
  out-of-stock-lore:
    - "&cMat hàng này đã hết!"

bulk-pricing:
  enabled: true
  discount-brackets:
    "1":
      amount: 8
      discount: 5
    "2":
      amount: 16
      discount: 10
    "3":
      amount: 32
      discount: 15
    "4":
      amount: 64
      discount: 20

transaction-history:
  enabled: true
  max-entries-per-vendor: 100
  storage-file: "transactions"
  auto-delete-days: 30

vendor:
  max-items-per-stall: 27
  max-stalls-per-player: 3
  stall-expire-days: 7
  auto-save-interval: 300
